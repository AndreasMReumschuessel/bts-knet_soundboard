name: ✨ Feature request
description: Suggest an idea for BTS Soundboard
title: "[feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion! Tell us what you'd like and why.
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: What's the use case? What can't you do today?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see? UI mockups, API shapes, or just a description.
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Which component is this for?
      options:
        - Backend (server)
        - Web PWA
        - Desktop (Electron)
        - Shared package
        - CI / build / release
        - Documentation
        - Whole project
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Have you tried any workarounds or alternative approaches?
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else relevant — links, screenshots, related issues.
