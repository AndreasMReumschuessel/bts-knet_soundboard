name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: lint-typecheck-build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      # Optional artifacts for build inspection (ADR-0007: not required on PRs,
      # but useful for verifying build output). `if-no-files-found: warn` keeps
      # the gate green if a dist dir is absent on the current scaffold.
      - name: Upload web build artifact
        uses: actions/upload-artifact@v7
        with:
          name: web-dist
          path: apps/web/dist
          if-no-files-found: warn

      - name: Upload desktop build artifact
        uses: actions/upload-artifact@v7
        with:
          name: desktop-dist
          path: apps/desktop/dist
          if-no-files-found: warn
