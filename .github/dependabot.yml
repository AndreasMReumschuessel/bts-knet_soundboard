version: 2
updates:
  # Root + workspace npm dependencies
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    labels:
      - dependencies
    groups:
      typescript:
        patterns:
          - typescript
          - "@types/*"
      react:
        patterns:
          - react
          - react-dom
          - "@types/react"
          - "@types/react-dom"
      build-tools:
        patterns:
          - vite
          - "@vitejs/plugin-react"
      electron:
        patterns:
          - electron
          - electron-builder

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - ci
