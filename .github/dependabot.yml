# Dependabot configuration.
# @types/node is intentionally pinned to ^24 to match the Node 24 LTS runtime
# floor (ADR-0012). Ignore major bumps (e.g. ^26, which is "current," not LTS).
version: 2
updates:
  # Root + workspace npm dependencies
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    labels:
      - dependencies
    groups:
      typescript:
        patterns:
          - typescript
          - "@types/*"
      react:
        patterns:
          - react
          - react-dom
          - "@types/react"
          - "@types/react-dom"
      build-tools:
        patterns:
          - vite
          - "@vitejs/plugin-react"
      electron:
        patterns:
          - electron
          - electron-builder
    ignore:
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - ci
